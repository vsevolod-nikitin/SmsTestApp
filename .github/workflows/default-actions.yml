name: DefaultActions

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true

      - name: Restore
        run: |
          dotnet restore src/SmsTestApp.Api/SmsTestApp.Api.csproj
          dotnet restore src/SmsTestApp.ConsoleClient/SmsTestApp.ConsoleClient.csproj
          dotnet restore src/SmsTestApp.WpfClient/SmsTestApp.WpfClient.csproj

      - name: Build SmsTestApp.Api
        run: dotnet build src/SmsTestApp.Api/SmsTestApp.Api.csproj -c Release --no-restore

      - name: Build SmsTestApp.ConsoleClient
        run: dotnet build src/SmsTestApp.ConsoleClient/SmsTestApp.ConsoleClient.csproj -c Release --no-restore

      - name: Build SmsTestApp.WpfClient
        run: dotnet build src/SmsTestApp.WpfClient/SmsTestApp.WpfClient.csproj -c Release --no-restore